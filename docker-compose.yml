version: '3.8'

services:
  backend:
    build: ./backend/agent-core
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - skillroute_net

  frontend:
    build: ./frontend/ui-components
    ports:
      - "3000:3000"
    networks:
      - skillroute_net

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - skillroute_net

networks:
  skillroute_net:
    driver: bridge
